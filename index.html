<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>BCPL &rarr; WebAssembly playground</title>
  <style>
    :root {
      color-scheme: dark;
      --bg:       #0b0f15;
      --bg-2:     #0e1116;
      --bg-3:     #141a23;
      --border:   #242a34;
      --fg:       #e6edf3;
      --fg-dim:   #8b95a5;
      --accent:   #6cb6ff;
      --entry:    #ffbe55;
      --err:      #f07178;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, sans-serif;
      background: var(--bg);
      color: var(--fg);
      font-size: 14px;
      line-height: 1.4;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    header {
      padding: 0.6rem 1rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: baseline;
      gap: 1rem;
      flex-shrink: 0;
    }
    header h1 { font-size: 1.1rem; margin: 0; }
    header .sub { color: var(--fg-dim); font-size: 0.8rem; }

    .workspace {
      flex: 1;
      display: grid;
      grid-template-columns: 18rem 1fr;
      grid-template-rows: 1fr 16rem;
      gap: 1px;
      background: var(--border);
      overflow: hidden;
    }
    .left-pane, .right-pane, .output-pane {
      background: var(--bg);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .output-pane { grid-column: 1 / -1; }

    /* Tab strip shared styles */
    .tabs {
      display: flex;
      border-bottom: 1px solid var(--border);
      background: var(--bg-2);
      flex-shrink: 0;
    }
    .tab {
      padding: 0.4rem 0.9rem;
      background: transparent;
      border: 0;
      border-right: 1px solid var(--border);
      color: var(--fg-dim);
      cursor: pointer;
      font: inherit;
      font-size: 0.85rem;
    }
    .tab.active {
      background: var(--bg);
      color: var(--fg);
      border-bottom: 2px solid var(--accent);
      margin-bottom: -1px;
    }
    .tab:hover:not(.active) { color: var(--fg); }

    .tab-body {
      flex: 1;
      overflow: auto;
      padding: 0.5rem;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }
    .tab-body.hidden { display: none; }

    /* File list */
    .file-list, .example-list, .api-list {
      list-style: none;
      padding: 0;
      margin: 0;
      font-family: ui-monospace, monospace;
      font-size: 0.82rem;
      flex: 1;
      overflow: auto;
    }
    .file-list li, .example-list li, .api-list li {
      display: flex;
      align-items: center;
      gap: 0.25rem;
      padding: 0.2rem 0.4rem;
      border-radius: 3px;
      cursor: pointer;
    }
    .file-list li:hover, .example-list li:hover, .api-list li:hover {
      background: var(--bg-3);
    }
    .file-list li.active, .example-list li.active, .api-list li.active {
      background: var(--bg-3);
      color: var(--fg);
    }
    .file-list li .name { flex: 1; }
    .file-list li .name.entry::after {
      content: "  *";
      color: var(--entry);
    }
    .file-list li button {
      padding: 0 0.3rem;
      font-size: 0.7rem;
      background: transparent;
      color: var(--fg-dim);
      border: 1px solid var(--border);
      border-radius: 3px;
      cursor: pointer;
    }
    .file-list li button:hover { color: var(--fg); }

    .file-actions {
      display: flex;
      gap: 0.3rem;
      flex-wrap: wrap;
    }
    .file-actions button {
      padding: 0.25rem 0.5rem;
      background: var(--bg-2);
      border: 1px solid var(--border);
      color: var(--fg);
      border-radius: 3px;
      cursor: pointer;
      font: inherit;
      font-size: 0.75rem;
    }
    .file-actions button:hover { border-color: var(--accent); }

    /* API pane */
    .api-filter {
      width: 100%;
      padding: 0.3rem 0.5rem;
      background: var(--bg-2);
      border: 1px solid var(--border);
      color: var(--fg);
      border-radius: 3px;
      font: inherit;
      font-size: 0.85rem;
    }
    .api-list { max-height: 16rem; }
    .api-list .cat {
      font-size: 0.65rem;
      color: var(--fg-dim);
      margin-left: auto;
    }
    .api-detail {
      border-top: 1px solid var(--border);
      padding: 0.5rem;
      font-size: 0.82rem;
    }
    .api-detail .sig {
      font-family: ui-monospace, monospace;
      color: var(--accent);
      margin-bottom: 0.3rem;
    }
    .api-detail .desc { color: var(--fg-dim); }

    /* Right pane */
    .right-pane { background: var(--bg-2); }
    .right-pane .source-tabs {
      overflow-x: auto;
      scrollbar-width: thin;
    }
    .right-pane .source-tabs .tab {
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      white-space: nowrap;
    }
    .right-pane .source-tabs .tab .close {
      padding: 0 0.2rem;
      color: var(--fg-dim);
      background: transparent;
      border: 0;
      cursor: pointer;
      font-size: 0.75rem;
    }
    .right-pane .source-tabs .tab .close:hover { color: var(--err); }
    .right-pane .source-tabs .tab.preview { font-style: italic; }
    .right-pane .source-tabs .tab.wat-tab { color: var(--accent); }
    .right-pane .source-tabs .tab.entry::before {
      content: "*";
      color: var(--entry);
      margin-right: 0.25rem;
    }
    .editor-host {
      flex: 1;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    #userSrc, #liveWat {
      flex: 1;
      width: 100%;
      margin: 0;
      border: 0;
      padding: 0.6rem;
      background: var(--bg-2);
      color: var(--fg);
      font-family: ui-monospace, monospace;
      font-size: 0.8rem;
      resize: none;
      outline: none;
      line-height: 1.5;
    }
    #userSrc[readonly] {
      background: var(--bg);
      color: var(--fg-dim);
    }
    #liveWat {
      white-space: pre-wrap;
      overflow: auto;
      margin: 0;
    }
    .preview-note {
      background: var(--bg-3);
      color: var(--fg-dim);
      font-size: 0.78rem;
      padding: 0.4rem 0.6rem;
      display: none;
      border-bottom: 1px solid var(--border);
      gap: 0.5rem;
      align-items: flex-start;
    }
    .preview-note.visible { display: flex; }
    .preview-note button {
      padding: 0.2rem 0.5rem;
      background: var(--accent);
      color: #000;
      border: 0;
      border-radius: 3px;
      cursor: pointer;
      font: inherit;
      font-size: 0.75rem;
      flex-shrink: 0;
    }
    .preview-note button:disabled {
      background: var(--bg-2);
      color: var(--fg-dim);
      cursor: not-allowed;
    }
    .preview-meta .title {
      color: var(--fg);
      font-weight: 600;
      font-size: 0.85rem;
    }
    .preview-meta .badge {
      display: inline-block;
      margin-left: 0.4rem;
      padding: 0 0.35rem;
      background: var(--bg-2);
      border: 1px solid var(--border);
      border-radius: 3px;
      font-size: 0.65rem;
      color: var(--fg-dim);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .preview-meta .summary { margin-top: 0.2rem; }
    .preview-meta ul {
      margin: 0.2rem 0 0 1.1rem;
      padding: 0;
    }
    .preview-meta li { margin: 0; }
    .action-row {
      padding: 0.4rem 0.6rem;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 0.5rem;
      align-items: center;
      flex-shrink: 0;
      background: var(--bg);
    }
    .action-row button {
      padding: 0.4rem 0.8rem;
      font: inherit;
      background: var(--accent);
      color: #000;
      border: 0;
      border-radius: 3px;
      cursor: pointer;
      font-weight: 600;
    }
    .action-row button:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }
    .compile-status {
      font-size: 0.8rem;
      color: var(--fg-dim);
    }
    .compile-status.err { color: var(--err); }

    /* Output / stdin / canvas */
    .output-pane {
      display: grid;
      grid-template-columns: 1fr 20rem;
      grid-template-rows: auto 1fr;
      gap: 1px;
      background: var(--border);
    }
    .output-pane.with-canvas {
      grid-template-columns: 1fr 20rem 24rem;
    }
    .output-pane .pane-header {
      padding: 0.3rem 0.6rem;
      background: var(--bg-2);
      font-size: 0.78rem;
      color: var(--fg-dim);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    #output, #stdin {
      margin: 0;
      padding: 0.5rem 0.6rem;
      background: var(--bg-2);
      color: var(--fg);
      font-family: ui-monospace, monospace;
      font-size: 0.8rem;
      overflow: auto;
      border: 0;
      outline: none;
      resize: none;
      white-space: pre-wrap;
    }
    .canvas-cell {
      display: none;
      grid-row: 1 / span 2;
      grid-column: 3;
      background: var(--bg-2);
      align-items: center;
      justify-content: center;
      padding: 0.5rem;
      overflow: auto;
    }
    .output-pane.with-canvas .canvas-cell { display: flex; }
    #sdlCanvas {
      background: #000;
      max-width: 100%;
      max-height: 100%;
      image-rendering: pixelated;
    }

    code {
      background: rgba(128,128,128,0.15);
      padding: 0 0.25rem;
      border-radius: 3px;
      font-family: ui-monospace, monospace;
    }
  </style>
</head>
<body>
  <header>
    <h1>BCPL &rarr; WebAssembly</h1>
    <span class="sub">
      self-hosted <code>bcplwasm</code> + browser runtime. multi-file programs supported.
    </span>
    <span class="sub" id="buildTag" style="margin-left: auto; font-family: ui-monospace, monospace; font-size: 0.75rem;"></span>
  </header>

  <div class="workspace">
    <!-- LEFT PANE -->
    <aside class="left-pane">
      <nav class="tabs" id="leftTabs">
        <button class="tab active" data-tab="files">Files</button>
        <button class="tab"        data-tab="examples">Examples</button>
        <button class="tab"        data-tab="api">API</button>
      </nav>

      <div class="tab-body" id="tab-files">
        <ul id="fileList" class="file-list"></ul>
        <div class="file-actions">
          <button id="addFile">+ file</button>
          <button id="renameFile">rename</button>
          <button id="setEntryBtn">set entry</button>
          <button id="resetFiles">reset</button>
        </div>
      </div>

      <div class="tab-body hidden" id="tab-examples">
        <ul id="exampleList" class="example-list"></ul>
        <div class="file-actions" style="color: var(--fg-dim); font-size: 0.75rem;">
          click to preview in the editor pane
        </div>
      </div>

      <div class="tab-body hidden" id="tab-api">
        <input id="apiFilter" class="api-filter" placeholder="filter (name)…">
        <ul id="apiList" class="api-list"></ul>
        <div class="api-detail" id="apiDetail">
          <div class="desc">Select a function to see its signature and description.</div>
        </div>
      </div>
    </aside>

    <!-- RIGHT PANE -->
    <main class="right-pane">
      <nav class="tabs source-tabs" id="sourceTabs"></nav>
      <div class="preview-note" id="previewNote">
        <div id="previewMeta" style="flex:1;"></div>
        <button id="prevLesson" title="previous lesson">◀</button>
        <button id="nextLesson" title="next lesson">▶</button>
        <button id="savePreview">Save as file</button>
      </div>
      <div class="editor-host">
        <textarea id="userSrc" spellcheck="false"></textarea>
        <pre id="liveWat">(not yet compiled)</pre>
      </div>
      <div class="action-row">
        <button id="compileRun">Compile &amp; Run</button>
        <span id="compileStatus" class="compile-status"></span>
      </div>
    </main>

    <!-- OUTPUT / STDIN / GRAPHICS -->
    <section class="output-pane" id="outputPane">
      <div class="pane-header">Program output</div>
      <div class="pane-header">Stdin (consumed by rdch)</div>
      <pre id="output"></pre>
      <textarea id="stdin" spellcheck="false" placeholder="type input here before Compile &amp; Run"></textarea>
      <div class="canvas-cell" id="canvasCell">
        <canvas id="sdlCanvas" width="320" height="240"></canvas>
      </div>
    </section>
  </div>

  <script type="module">
    const V = Date.now();
    // Build tag in header — derived from the page's last-modified
    // header (server-side mtime). If the browser served a cached
    // response, the time shown reflects the CACHED page's mtime, so
    // it doubles as a "did my reload actually pick up changes?"
    // indicator. Click to copy timestamp.
    {
      const tag = document.getElementById("buildTag");
      const lm  = new Date(document.lastModified || Date.now());
      const pad = (n) => String(n).padStart(2, "0");
      const txt = `build ${lm.getFullYear()}-${pad(lm.getMonth()+1)}-${pad(lm.getDate())} ` +
                  `${pad(lm.getHours())}:${pad(lm.getMinutes())}:${pad(lm.getSeconds())}`;
      tag.textContent = txt;
      tag.title = "page last-modified — bump on reload to verify cache busted";
    }
    const { BcplRuntime, storageBackend } = await import(`./runtime.js?v=${V}`);
    const { slots, aliases } = await import(`./stdlib-manifest.mjs?v=${V}`);
    const { API_DOCS } = await import(`./api-docs.mjs?v=${V}`);
    const { TRACK, LEVELS, BY_SLUG, nextSlug, prevSlug } =
      await import(`./tutorial.mjs?v=${V}`);

    // Extras: examples not part of the tutorial track (e.g. stdlib demo).
    const EXTRAS = ["stdlib"];

    // ------------------ DOM refs ------------------
    const fileListEl    = document.getElementById("fileList");
    const exampleListEl = document.getElementById("exampleList");
    const apiListEl     = document.getElementById("apiList");
    const apiFilterEl   = document.getElementById("apiFilter");
    const apiDetailEl   = document.getElementById("apiDetail");
    const sourceTabsEl  = document.getElementById("sourceTabs");
    const userSrcEl     = document.getElementById("userSrc");
    const liveWatEl     = document.getElementById("liveWat");
    const previewNoteEl = document.getElementById("previewNote");
    const previewMetaEl = document.getElementById("previewMeta");
    const prevLessonBtn = document.getElementById("prevLesson");
    const nextLessonBtn = document.getElementById("nextLesson");
    const savePreviewBtn = document.getElementById("savePreview");
    const outputEl      = document.getElementById("output");
    const stdinEl       = document.getElementById("stdin");
    const compileBtn    = document.getElementById("compileRun");
    const statusEl      = document.getElementById("compileStatus");

    // ------------------ Left-pane tab switching ------------------
    function bindLeftTabs() {
      const strip = document.getElementById("leftTabs");
      strip.addEventListener("click", (e) => {
        const btn = e.target.closest(".tab");
        if (!btn) return;
        strip.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
        btn.classList.add("active");
        const key = btn.getAttribute("data-tab");
        document.querySelectorAll(`[id^="tab-"]`).forEach(el => {
          el.classList.toggle("hidden", el.id !== "tab-" + key);
        });
      });
    }
    bindLeftTabs();

    // ------------------ Files tab ------------------
    const FILES_LS_KEY = "bcpl-playground-files-v1";
    const DEFAULT_FILES = [
      {
        name: "main.b",
        entry: true,
        content: `GET "libhdr"

LET start() = VALOF
{ writef("hello from self-hosted bcplwasm!*n")
  RESULTIS 0
}
`,
      },
    ];
    let files = loadFiles();

    // ------------------ Source-tab bar state ------------------
    // Each entry in sourceTabs describes one tab on the right pane:
    //   { kind: 'file',    fileIdx: n }
    //   { kind: 'preview', name, content }
    //   { kind: 'wat' }               (singleton, always last)
    // activeTab is the index within sourceTabs. Clicking a file in
    // the left Files tab opens (or focuses) its sourceTab. Clicking
    // an example opens a preview sourceTab.
    let sourceTabs = [];
    let activeTab = 0;
    function rebuildSourceTabs(preserve = true) {
      // Keep preview + wat tabs; rebuild file tabs to match `files`.
      const kept = sourceTabs.filter(t => t.kind !== "file");
      const prev = sourceTabs[activeTab];
      sourceTabs = files.map((_, i) => ({ kind: "file", fileIdx: i }))
                       .concat(kept);
      if (!sourceTabs.some(t => t.kind === "wat")) {
        sourceTabs.push({ kind: "wat" });
      }
      // Try to preserve active selection.
      if (preserve && prev) {
        const idx = sourceTabs.findIndex(t =>
          (t.kind === prev.kind) &&
          (t.fileIdx === prev.fileIdx) &&
          (t.name === prev.name));
        activeTab = idx >= 0 ? idx : 0;
      } else {
        activeTab = 0;
      }
      renderSourceTabs();
      showActive();
    }
    function renderSourceTabs() {
      sourceTabsEl.innerHTML = "";
      sourceTabs.forEach((t, i) => {
        const btn = document.createElement("button");
        btn.className = "tab" + (i === activeTab ? " active" : "");
        let label = "";
        if (t.kind === "file") {
          const f = files[t.fileIdx];
          if (!f) return;
          label = f.name;
          if (f.entry) btn.classList.add("entry");
        } else if (t.kind === "preview") {
          label = `${t.name} (preview)`;
          btn.classList.add("preview");
        } else if (t.kind === "wat") {
          label = "WAT";
          btn.classList.add("wat-tab");
        }
        const span = document.createElement("span");
        span.textContent = label;
        span.onclick = () => { activeTab = i; renderSourceTabs(); showActive(); };
        btn.appendChild(span);
        // Close button only for preview tabs.
        if (t.kind === "preview") {
          const close = document.createElement("button");
          close.className = "close";
          close.textContent = "×";
          close.title = "close preview";
          close.onclick = (e) => {
            e.stopPropagation();
            sourceTabs.splice(i, 1);
            if (activeTab >= sourceTabs.length) activeTab = sourceTabs.length - 1;
            if (activeTab < 0) activeTab = 0;
            renderSourceTabs(); showActive();
          };
          btn.appendChild(close);
        }
        sourceTabsEl.appendChild(btn);
      });
    }
    function showActive() {
      const t = sourceTabs[activeTab];
      if (!t) return;
      if (t.kind === "file") {
        const f = files[t.fileIdx];
        userSrcEl.value = f?.content ?? "";
        userSrcEl.readOnly = false;
        userSrcEl.style.display = "block";
        liveWatEl.style.display = "none";
        previewNoteEl.classList.remove("visible");
      } else if (t.kind === "preview") {
        userSrcEl.value = t.content;
        userSrcEl.readOnly = true;
        userSrcEl.style.display = "block";
        liveWatEl.style.display = "none";
        renderPreviewMeta(t.name);
        previewNoteEl.classList.add("visible");
      } else if (t.kind === "wat") {
        userSrcEl.style.display = "none";
        liveWatEl.style.display = "block";
        previewNoteEl.classList.remove("visible");
      }
      // Sync left Files list highlight.
      renderFileList();
    }
    function openFileTab(fileIdx) {
      const existing = sourceTabs.findIndex(t =>
        t.kind === "file" && t.fileIdx === fileIdx);
      if (existing >= 0) {
        activeTab = existing;
      } else {
        // Insert just before WAT tab.
        const watPos = sourceTabs.findIndex(t => t.kind === "wat");
        const at = watPos >= 0 ? watPos : sourceTabs.length;
        sourceTabs.splice(at, 0, { kind: "file", fileIdx });
        activeTab = at;
      }
      renderSourceTabs(); showActive();
    }
    function openPreviewTab(name, content) {
      const existing = sourceTabs.findIndex(t =>
        t.kind === "preview" && t.name === name);
      if (existing >= 0) {
        sourceTabs[existing].content = content;
        activeTab = existing;
      } else {
        const watPos = sourceTabs.findIndex(t => t.kind === "wat");
        const at = watPos >= 0 ? watPos : sourceTabs.length;
        sourceTabs.splice(at, 0, { kind: "preview", name, content });
        activeTab = at;
      }
      renderSourceTabs(); showActive();
    }
    function promotePreview() {
      const t = sourceTabs[activeTab];
      if (!t || t.kind !== "preview") return;
      const fileName = `${t.name}.b`;
      if (files.some(f => f.name === fileName)) {
        if (!confirm(`"${fileName}" already exists — overwrite?`)) return;
      }
      const existing = files.findIndex(f => f.name === fileName);
      if (existing >= 0) {
        files[existing].content = t.content;
      } else {
        files.push({ name: fileName, entry: false, content: t.content });
      }
      persistFiles();
      // Close the preview, focus the resulting file tab.
      sourceTabs.splice(activeTab, 1);
      rebuildSourceTabs(false);
      const newFileIdx = files.findIndex(f => f.name === fileName);
      openFileTab(newFileIdx);
    }

    function loadFiles() {
      try {
        const raw = localStorage.getItem(FILES_LS_KEY);
        if (raw) {
          const parsed = JSON.parse(raw);
          if (Array.isArray(parsed) && parsed.length) return parsed;
        }
      } catch {}
      return structuredClone(DEFAULT_FILES);
    }
    function persistFiles() {
      try { localStorage.setItem(FILES_LS_KEY, JSON.stringify(files)); } catch {}
    }
    // Return the file-index of the currently-active file tab, or -1 if
    // the active tab is a preview/WAT.
    function activeFileIdx() {
      const t = sourceTabs[activeTab];
      return (t && t.kind === "file") ? t.fileIdx : -1;
    }
    function commitActiveEdit() {
      const i = activeFileIdx();
      if (i >= 0) files[i].content = userSrcEl.value;
    }
    function renderFileList() {
      fileListEl.innerHTML = "";
      const activeFile = activeFileIdx();
      files.forEach((f, i) => {
        const li = document.createElement("li");
        if (i === activeFile) li.classList.add("active");
        const name = document.createElement("span");
        name.className = "name" + (f.entry ? " entry" : "");
        name.textContent = f.name;
        name.onclick = () => openFileTab(i);
        li.appendChild(name);
        const del = document.createElement("button");
        del.textContent = "×";
        del.title = "delete";
        del.onclick = (e) => { e.stopPropagation(); deleteFile(i); };
        li.appendChild(del);
        fileListEl.appendChild(li);
      });
    }
    function addFile() {
      commitActiveEdit();
      const name = prompt("New file name (.b or .h):", "mylib.b");
      if (!name) return;
      if (files.some(f => f.name === name)) { alert(`"${name}" already exists`); return; }
      const isSrc = name.endsWith(".b");
      files.push({
        name,
        entry: false,
        content: isSrc
          ? `SECTION "${name.replace(/\.b$/, "")}"\n\nGET "libhdr"\n\n`
          : "// BCPL header — declare globals here\n\nGLOBAL {\n}\n",
      });
      persistFiles();
      rebuildSourceTabs(false);
      openFileTab(files.length - 1);
    }
    function deleteFile(i) {
      commitActiveEdit();
      if (files.length === 1) { alert("keep at least one file"); return; }
      if (!confirm(`delete "${files[i].name}"?`)) return;
      const wasEntry = files[i].entry;
      files.splice(i, 1);
      if (wasEntry) {
        const b = files.findIndex(f => f.name.endsWith(".b"));
        if (b >= 0) files[b].entry = true;
      }
      // Drop any source tabs referencing the removed file; shift
      // fileIdx for tabs after it.
      sourceTabs = sourceTabs.filter(t => !(t.kind === "file" && t.fileIdx === i));
      for (const t of sourceTabs) {
        if (t.kind === "file" && t.fileIdx > i) t.fileIdx--;
      }
      persistFiles();
      rebuildSourceTabs(true);
    }
    function renameFile() {
      const i = activeFileIdx();
      if (i < 0) { alert("rename applies to a file tab"); return; }
      commitActiveEdit();
      const cur = files[i];
      const name = prompt("New name:", cur.name);
      if (!name || name === cur.name) return;
      if (files.some((f, j) => j !== i && f.name === name)) {
        alert(`"${name}" already exists`); return;
      }
      cur.name = name;
      persistFiles();
      renderSourceTabs();
      renderFileList();
    }
    function setEntry() {
      const i = activeFileIdx();
      if (i < 0) { alert("select a .b file tab first"); return; }
      commitActiveEdit();
      const cur = files[i];
      if (!cur.name.endsWith(".b")) { alert("entry must be a .b file"); return; }
      for (const f of files) f.entry = (f === cur);
      persistFiles();
      renderSourceTabs();
      renderFileList();
    }
    function resetFiles() {
      if (!confirm("Reset to default file list?")) return;
      files = structuredClone(DEFAULT_FILES);
      sourceTabs = [];
      persistFiles();
      rebuildSourceTabs(false);
    }

    // ------------------ Examples tab (tutorial track) ------------------
    let selectedExample = TRACK[0]?.slug ?? EXTRAS[0];

    async function openExamplePreview(slug) {
      commitActiveEdit();
      selectedExample = slug;
      renderExampleList();
      const src = await fetchText(`examples/${slug}.b?v=${Date.now()}`, "");
      if (src) openPreviewTab(slug, src);
    }

    // Fill the preview note bar for a given preview slug. If the slug
    // is in the tutorial TRACK, show title/level/summary/goals and
    // enable prev/next navigation. Otherwise fall back to a minimal line.
    function renderPreviewMeta(slug) {
      const entry = BY_SLUG.get(slug);
      previewMetaEl.className = "preview-meta";
      if (!entry) {
        previewMetaEl.innerHTML =
          `<div class="title">${escapeHtml(slug)}</div>` +
          `<div class="summary">Preview — save to make it a regular file.</div>`;
        prevLessonBtn.disabled = true;
        nextLessonBtn.disabled = true;
        return;
      }
      const level = LEVELS.find(l => l.n === entry.level);
      let html = `<div><span class="title">${escapeHtml(entry.title)}</span>` +
        `<span class="badge">L${entry.level} · ${escapeHtml(entry.topic)}</span></div>` +
        `<div class="summary">${escapeHtml(entry.summary)}</div>`;
      if (entry.goals?.length) {
        html += "<ul>";
        for (const g of entry.goals) html += `<li>${escapeHtml(g)}</li>`;
        html += "</ul>";
      }
      previewMetaEl.innerHTML = html;
      prevLessonBtn.disabled = !prevSlug(slug);
      nextLessonBtn.disabled = !nextSlug(slug);
    }

    function currentPreviewSlug() {
      const t = sourceTabs[activeTab];
      return (t && t.kind === "preview") ? t.name : null;
    }
    function goPrevLesson() {
      const cur = currentPreviewSlug();
      if (!cur) return;
      const p = prevSlug(cur);
      if (p) openExamplePreview(p);
    }
    function goNextLesson() {
      const cur = currentPreviewSlug();
      if (!cur) return;
      const n = nextSlug(cur);
      if (n) openExamplePreview(n);
    }

    function renderExampleList() {
      exampleListEl.innerHTML = "";

      // "Start tutorial" button jumps to the first lesson.
      const start = document.createElement("li");
      start.innerHTML = "<span style='color: var(--accent);'>▶ Start tutorial</span>";
      start.style.fontStyle = "italic";
      start.onclick = () => openExamplePreview(TRACK[0].slug);
      exampleListEl.appendChild(start);

      // Group track entries by level.
      for (const lv of LEVELS) {
        const lessons = TRACK.filter(e => e.level === lv.n);
        if (!lessons.length) continue;
        const hdr = document.createElement("li");
        hdr.style.pointerEvents = "none";
        hdr.style.color = "var(--fg-dim)";
        hdr.style.marginTop = "0.4rem";
        hdr.style.fontSize = "0.72rem";
        hdr.style.textTransform = "uppercase";
        hdr.style.letterSpacing = "0.05em";
        hdr.textContent = `Level ${lv.n} — ${lv.name}`;
        exampleListEl.appendChild(hdr);
        for (const e of lessons) {
          const li = document.createElement("li");
          li.textContent = e.title;
          li.title = e.summary;
          if (e.slug === selectedExample) li.classList.add("active");
          li.onclick = () => openExamplePreview(e.slug);
          exampleListEl.appendChild(li);
        }
      }

      // Extras section (non-track demos).
      if (EXTRAS.length) {
        const hdr = document.createElement("li");
        hdr.style.pointerEvents = "none";
        hdr.style.color = "var(--fg-dim)";
        hdr.style.marginTop = "0.6rem";
        hdr.style.fontSize = "0.72rem";
        hdr.style.textTransform = "uppercase";
        hdr.style.letterSpacing = "0.05em";
        hdr.textContent = "Extras";
        exampleListEl.appendChild(hdr);
        for (const name of EXTRAS) {
          const li = document.createElement("li");
          li.textContent = name;
          if (name === selectedExample) li.classList.add("active");
          li.onclick = () => openExamplePreview(name);
          exampleListEl.appendChild(li);
        }
      }
    }

    // ------------------ API tab ------------------
    function renderApiList(filter = "") {
      apiListEl.innerHTML = "";
      const seen = new Set();
      const allNames = [
        ...slots.map(s => s.name).filter(n => n !== "stop_fn"),
        ...aliases.map(a => a.name),
      ].filter(n => !seen.has(n) && (seen.add(n), true));
      allNames.sort();
      const f = filter.toLowerCase();
      for (const name of allNames) {
        if (f && !name.toLowerCase().includes(f)) continue;
        const doc = API_DOCS[name];
        const li = document.createElement("li");
        const lbl = document.createElement("span");
        lbl.textContent = name;
        li.appendChild(lbl);
        if (doc?.cat) {
          const c = document.createElement("span");
          c.className = "cat";
          c.textContent = doc.cat;
          li.appendChild(c);
        }
        li.onclick = () => showApi(name, li);
        apiListEl.appendChild(li);
      }
    }
    function showApi(name, li) {
      apiListEl.querySelectorAll("li").forEach(x => x.classList.remove("active"));
      li?.classList.add("active");
      const doc = API_DOCS[name];
      if (!doc) {
        apiDetailEl.innerHTML =
          `<div class="sig">${name}</div>` +
          `<div class="desc">(no help available — see g/libhdr.h or BCPL manual)</div>`;
        return;
      }
      apiDetailEl.innerHTML =
        `<div class="sig">${escapeHtml(doc.sig)}</div>` +
        `<div class="desc">${escapeHtml(doc.desc)}</div>`;
    }
    function escapeHtml(s) {
      return String(s).replace(/[&<>]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;"}[c]));
    }

    // ------------------ GET + compile ------------------
    async function fetchText(url, fallback) {
      const r = await fetch(url);
      return r.ok ? await r.text() : fallback;
    }

    const BUILTIN_HEADERS = ["libhdr.h", "bcplfecg.h", "sdl.h"];
    async function seedBuiltinHeaders() {
      for (const h of BUILTIN_HEADERS) {
        if (storageBackend.get(h)) continue;
        const txt = await fetchText(`headers/${h}?v=${V}`, "");
        if (txt) storageBackend.set(h, txt);
      }
    }
    function seedUserFiles() {
      for (const f of files) storageBackend.set(f.name, f.content);
    }

    let wabtPromise = null;
    function getWabt() {
      if (!wabtPromise) {
        wabtPromise = import("https://esm.sh/wabt@1.0.36").then(m => m.default());
      }
      return wabtPromise;
    }

    // Lazy-load binaryen for the in-browser asyncify pass.
    // jsDelivr's +esm bundles the CommonJS package as ESM without
    // tripping over Node's require shim (esm.sh's polyfill rejects it).
    // Pin >=122 so the parser accepts our bulk-memory wasm.
    let binaryenPromise = null;
    function getBinaryen() {
      if (!binaryenPromise) {
        binaryenPromise = import("https://cdn.jsdelivr.net/npm/binaryen@129/+esm");
      }
      return binaryenPromise;
    }

    // List of imports that may suspend execution. Must match
    // bcpl2wasm.sh + site/build.sh to keep behavior consistent.
    const ASYNC_IMPORTS = [
      "env.bcpl_cowait", "env.bcpl_callco", "env.bcpl_resumeco",
      "env.bcpl_changeco", "env.bcpl_delay",
    ];

    // Run asyncify on a wasm buffer and return the transformed bytes.
    async function asyncifyTransform(bytes) {
      const mod_ns = await getBinaryen();
      const binaryen = mod_ns.default ?? mod_ns;
      const mod = binaryen.readBinary(new Uint8Array(bytes));
      // Enable everything so the emitter preserves bulk-memory data
      // segments referenced by our register() function.
      if (typeof mod.setFeatures === "function" && binaryen.Features) {
        mod.setFeatures(binaryen.Features.All);
      }
      // Don't pass asyncify-imports: user modules call all stdlib
      // (incl. cowait/callco) via call_indirect to master's shared
      // ftable. They have no direct bcpl_* imports. Default asyncify
      // treats indirect calls as suspending, which is what we need.
      mod.runPasses(["asyncify"]);
      const out = mod.emitBinary();
      mod.dispose();
      // out is a Uint8Array whose .buffer may be larger; slice to the
      // exact bytes for a tight ArrayBuffer.
      return out.buffer.slice(out.byteOffset, out.byteOffset + out.byteLength);
    }

    // Source-level detection: user code uses one of the coroutine
    // suspend names. Compiled wasm doesn't import bcpl_cowait directly
    // (calls go through G!N dispatch via master), so .wat content
    // can't be inspected here — scan the BCPL source text.
    function srcNeedsAsyncify(srcText) {
      return /\b(cowait|callco|resumeco|changeco|createco|delay)\b/.test(srcText);
    }

    async function assembleWat(watText, label = "live.wat", needsAsync = false) {
      const wabt = await getWabt();
      const mod  = wabt.parseWat(label, watText);
      mod.resolveNames();
      mod.validate();
      const { buffer } = mod.toBinary({ log: false });
      mod.destroy();
      if (needsAsync) {
        outputEl.textContent += `[asyncify] transforming ${label}…\n`;
        try {
          const out = await asyncifyTransform(buffer);
          const inSize = buffer.byteLength;
          const outSize = out.byteLength ?? out.length;
          outputEl.textContent += `[asyncify] ${label}: ${inSize} -> ${outSize} bytes\n`;
          console.log(`[asyncify] ${label}: ${inSize} -> ${outSize} bytes`);
          return out;
        } catch (e) {
          const msg = e?.message ?? String(e);
          outputEl.textContent += `[asyncify] FAILED for ${label}: ${msg}\n`;
          console.error("[asyncify] FAILED:", e);
          return buffer;
        }
      }
      return buffer;
    }

    function splitModules(watText) {
      const out = []; let cur = null;
      for (const line of watText.split("\n")) {
        if (/^\(module\b/.test(line)) { if (cur) out.push(cur); cur = line + "\n"; }
        else if (cur) cur += line + "\n";
      }
      if (cur) out.push(cur);
      return out;
    }

    async function compileBcplFile(fromName, toName) {
      storageBackend.del?.(toName);
      const cmd = `FROM ${fromName} TO ${toName}\n`;
      let diag = "";
      const rt = new BcplRuntime((s) => { diag += s; }, cmd);
      await rt.loadMaster("master.wasm?v=" + V);
      for (const u of ["bcplwasm-1.wasm", "bcplwasm-2.wasm", "bcplwasm-3.wasm"]) {
        await rt.loadProgram(u + "?v=" + V);
      }
      rt.initMaster();
      let exitCode = 0;
      try { exitCode = await rt.run(); }
      catch (e) {
        throw new Error(`${fromName}: runtime error: ${e.message ?? e}\n${diag}`);
      }
      const wat = storageBackend.get(toName);
      if (!wat) throw new Error(`${fromName}: no .wat (exit=${exitCode})\n${diag}`);
      return { wat, diag, exitCode };
    }

    function setStatus(text, isErr = false) {
      statusEl.textContent = text;
      statusEl.classList.toggle("err", isErr);
    }

    // Walk GET "X" directives starting from the entry source.
    // Returns the ordered list of .b sources that need compiling:
    //   entry first... no wait, libraries first (so their register()
    //   runs before entry's register() overwrites G!1). Topological
    //   order with entry LAST.
    // Headers (.h) are seeded into storageBackend by seedUserFiles()
    // but never compiled.
    // Built-in names (libhdr / bcplfecg) are skipped — they're already
    // seeded as built-in headers and have no user-supplied .b.
    function resolveDeps(entryFile, filesArr) {
      const BUILTIN = new Set(["libhdr", "bcplfecg", "sdl"]);
      const byBaseName = new Map();
      for (const f of filesArr) {
        const m = f.name.match(/^(.*)\.(b|h)$/);
        if (m) byBaseName.set(m[1] + "." + m[2], f);
      }
      const ordered = [];      // libs first, entry LAST
      const visited = new Set();
      const visit = (file) => {
        if (visited.has(file.name)) return;
        visited.add(file.name);
        const gets = [...file.content.matchAll(/\bGET\s+"([^"]+)"/g)]
          .map(m => m[1]);
        for (const name of gets) {
          if (BUILTIN.has(name)) continue;
          // Resolve to .b if it exists; otherwise skip (.h-only is fine).
          const bFile = byBaseName.get(name + ".b");
          if (bFile && bFile !== file) visit(bFile);
        }
        if (file !== entryFile) ordered.push(file);
      };
      visit(entryFile);
      ordered.push(entryFile);  // entry last
      return ordered;
    }

    async function compileAndRun() {
      compileBtn.disabled = true;
      outputEl.textContent = "";
      liveWatEl.textContent = "(compiling…)";
      setStatus("compiling…");
      commitActiveEdit();
      persistFiles();
      try {
        await seedBuiltinHeaders();
        seedUserFiles();

        const allSources = files.filter(f => f.name.endsWith(".b"));
        if (allSources.length === 0) throw new Error("no .b source files");
        const entry = allSources.find(f => f.entry) ?? allSources[0];

        // Only compile entry + its transitive GET-resolved deps.
        // Other .b files in the list are seeded into storageBackend
        // (so a future GET resolves them) but not compiled this run.
        const sources = resolveDeps(entry, files);
        const libs  = sources.filter(f => f !== entry);

        const skipped = allSources.filter(f => !sources.includes(f));
        if (skipped.length) {
          outputEl.textContent +=
            `[deps] compiling ${sources.length} file(s); ` +
            `skipped ${skipped.length} unreferenced: ` +
            `${skipped.map(f => f.name).join(", ")}\n`;
        }

        const watByName = new Map();
        for (const f of sources) {
          setStatus(`compiling ${f.name}…`);
          const toName = `__out_${f.name}.wat`;
          const { wat } = await compileBcplFile(f.name, toName);
          watByName.set(f.name, wat);
        }

        liveWatEl.textContent = watByName.get(entry.name);

        setStatus("assembling…");
        const anyAsync = sources.some(s => srcNeedsAsyncify(s.content));
        outputEl.textContent += `[asyncify] needed=${anyAsync}\n`;
        if (anyAsync) setStatus("asyncify pass…");
        const assemble = async (src) => {
          const chunks = splitModules(watByName.get(src.name));
          const bufs = [];
          for (let i = 0; i < chunks.length; i++) {
            bufs.push(await assembleWat(chunks[i], `${src.name}#${i}`, anyAsync));
          }
          return bufs;
        };

        setStatus("loading…");
        const rt = new BcplRuntime(
          (s) => { outputEl.textContent += s; },
          stdinEl.value
        );
        // Wire the canvas + reveal callback so SDL ops have a target.
        const canvasEl = document.getElementById("sdlCanvas");
        const outputPaneEl = document.getElementById("outputPane");
        // Hide canvas at the start of each run; sdl_init re-enables.
        outputPaneEl.classList.remove("with-canvas");
        rt.setSdlCanvas(canvasEl, () => {
          outputPaneEl.classList.add("with-canvas");
          canvasEl.focus();
        });
        await rt.loadMaster("master.wasm?v=" + V);
        const modulesPerSource = [];
        for (const lib of libs) {
          const bufs = await assemble(lib);
          modulesPerSource.push(bufs.length);
          for (const b of bufs) await rt.loadProgramFromBytes(b);
        }
        {
          const bufs = await assemble(entry);
          modulesPerSource.push(bufs.length);
          for (const b of bufs) await rt.loadProgramFromBytes(b);
        }
        const warn = rt.checkEntryOrdering(modulesPerSource);
        if (warn) outputEl.textContent += `[warn] ${warn}\n`;
        rt.initMaster();
        setStatus("running…");
        const hasAsync = !!rt._coroutineExports?.();
        outputEl.textContent +=
          `[runtime] asyncify=${hasAsync} run=${rt.run.constructor.name}\n`;
        await rt.run();
        setStatus("ok");
      } catch (err) {
        setStatus(err.message ?? String(err), true);
        outputEl.textContent += `\n[compile+run error] ${err.message ?? err}`;
        console.error(err);
      } finally {
        compileBtn.disabled = false;
      }
    }

    // ------------------ Wiring ------------------
    compileBtn.addEventListener("click", compileAndRun);
    document.getElementById("addFile").addEventListener("click", addFile);
    document.getElementById("renameFile").addEventListener("click", renameFile);
    document.getElementById("setEntryBtn").addEventListener("click", setEntry);
    document.getElementById("resetFiles").addEventListener("click", resetFiles);
    savePreviewBtn.addEventListener("click", promotePreview);
    prevLessonBtn.addEventListener("click", goPrevLesson);
    nextLessonBtn.addEventListener("click", goNextLesson);
    apiFilterEl.addEventListener("input", () => renderApiList(apiFilterEl.value));
    userSrcEl.addEventListener("input", () => {
      const i = activeFileIdx();
      if (i < 0) return;  // readonly tab
      files[i].content = userSrcEl.value;
      persistFiles();
    });

    // Initial render.
    rebuildSourceTabs(false);
    renderFileList();
    renderExampleList();
    renderApiList();
  </script>
</body>
</html>
